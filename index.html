<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Device Orientation Fluid Simulation</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #111;
      touch-action: none; /* スマホでのスクロールを防止 */
    }
    #ui-container {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: rgba(0, 0, 0, 0.7);
      z-index: 10;
    }
    #startButton {
      padding: 15px 30px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
      background-color: #007bff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

  <div id="ui-container">
    <button id="startButton">センサーを許可して開始</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

  <script>
    // ==========================================
    // 1. 初期設定と変数の準備
    // ==========================================
    const width = window.innerWidth;
    const height = window.innerHeight;
    const particleRadius = 8;  // 流体の粒の大きさ
    const particleCount = 400; // 粒の数（スマホのスペックに合わせて調整）

    // Matter.js のセットアップ (物理演算)
    const engine = Matter.Engine.create();
    const world = engine.world;
    engine.world.gravity.y = 1; // 初期の重力（下方向）

    // Three.js のセットアップ (描画)
    const scene = new THREE.Scene();
    // 2Dシミュレーションのため、遠近感のないOrthographicCameraを使用
    const camera = new THREE.OrthographicCamera(width / -2, width / 2, height / 2, height / -2, 1, 1000);
    camera.position.z = 10;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // ==========================================
    // 2. オブジェクトの生成
    // ==========================================
    const particles = [];
    
    // Matter.js 境界線（画面の壁）の作成
    const wallOptions = { isStatic: true, friction: 0, restitution: 0.5 };
    const ground = Matter.Bodies.rectangle(width / 2, height + 25, width, 50, wallOptions);
    const ceiling = Matter.Bodies.rectangle(width / 2, -25, width, 50, wallOptions);
    const leftWall = Matter.Bodies.rectangle(-25, height / 2, 50, height, wallOptions);
    const rightWall = Matter.Bodies.rectangle(width + 25, height / 2, 50, height, wallOptions);
    Matter.World.add(world, [ground, ceiling, leftWall, rightWall]);

    // 流体パーティクル（Matter.js の円）の作成
    for (let i = 0; i < particleCount; i++) {
      const x = Math.random() * width;
      const y = Math.random() * height;
      const particle = Matter.Bodies.circle(x, y, particleRadius, {
        restitution: 0.6, // 反発係数
        friction: 0.01,   // 摩擦
        density: 0.05,    // 密度
        render: { visible: false } // Three.jsで描画するのでMatter側は非表示
      });
      particles.push(particle);
      Matter.World.add(world, particle);
    }

    // Three.js インスタンスドメッシュの作成（大量の描画を軽量化）
    const geometry = new THREE.CircleGeometry(particleRadius, 16);
    // 流体っぽく見せるために水色のマテリアルを設定
    const material = new THREE.MeshBasicMaterial({ color: 0x00aaff });
    const instancedMesh = new THREE.InstancedMesh(geometry, material, particleCount);
    scene.add(instancedMesh);

    const dummy = new THREE.Object3D();

    // ==========================================
    // 3. アニメーションループ
    // ==========================================
    function animate() {
      requestAnimationFrame(animate);

      // Matter.js の物理演算を進める
      Matter.Engine.update(engine, 1000 / 60);

      // 物理演算の結果を Three.js の描画に反映させる
      for (let i = 0; i < particleCount; i++) {
        const body = particles[i];
        
        // Matter.js(左上原点, Y下方向) -> Three.js(中央原点, Y上方向) への座標変換
        const px = body.position.x - width / 2;
        const py = -(body.position.y - height / 2);

        dummy.position.set(px, py, 0);
        dummy.rotation.z = -body.angle;
        dummy.updateMatrix();
        instancedMesh.setMatrixAt(i, dummy.matrix);
      }

      // インスタンスが更新されたことをThree.jsに通知
      instancedMesh.instanceMatrix.needsUpdate = true;
      renderer.render(scene, camera);
    }

    // ==========================================
    // 4. デバイスの傾き（ジャイロセンサー）の処理
    // ==========================================
    function handleOrientation(event) {
      let x = event.gamma || 0; // 左右の傾き (-90 〜 90)
      let y = event.beta || 0;  // 前後の傾き (-180 〜 180)

      // 傾きの値を物理演算の重力スケール（-1.5 〜 1.5程度）に正規化
      const gravityX = Math.max(-1.5, Math.min(1.5, x / 30));
      const gravityY = Math.max(-1.5, Math.min(1.5, y / 30));

      // Matter.js の重力に反映
      engine.world.gravity.x = gravityX;
      engine.world.gravity.y = gravityY;
    }

    // ==========================================
    // 5. 起動ボタン・イベントリスナーの設定
    // ==========================================
    const startButton = document.getElementById('startButton');
    const uiContainer = document.getElementById('ui-container');

    startButton.addEventListener('click', () => {
      // iOS 13以降の DeviceOrientationEvent 許可リクエスト
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
          .then(permissionState => {
            if (permissionState === 'granted') {
              window.addEventListener('deviceorientation', handleOrientation);
              startGame();
            } else {
              alert('センサーの利用が拒否されました。');
            }
          })
          .catch(console.error);
      } else {
        // Android または iOS12以前
        window.addEventListener('deviceorientation', handleOrientation);
        startGame();
      }
    });

    function startGame() {
      uiContainer.style.display = 'none'; // UIを消す
      animate(); // アニメーション開始
    }

    // リサイズ対応（簡易版）
    window.addEventListener('resize', () => {
      // 厳密には壁の再配置等が必要ですが、今回は再読み込みを促す挙動にしています
      location.reload();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Fluid Simulation with Gravity</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 20px; left: 20px; color: white;
            font-family: sans-serif; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="overlay">端末を傾けてください</div>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // --- シミュレーション設定 ---
        const RESOLUTION = 256;
        let gravity = new THREE.Vector2(0, -9.8);

        // --- Three.js 基本セットアップ ---
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 流体計算用のレンダーターゲット ---
        // 速度、密度などを保存するために2つのバッファを交互に入れ替えます（Ping-pong）
        const createBuffer = () => new THREE.WebGLRenderTarget(RESOLUTION, RESOLUTION, {
            type: THREE.FloatType,
            format: THREE.RGBAFormat,
            minFilter: THREE.LinearFilter,
            magFilter: THREE.LinearFilter
        });

        let densityBuffer = createBuffer();
        let densityBackBuffer = createBuffer();

        // --- 簡易版フルイドシェーダー (密度更新 + 重力) ---
        const fluidMaterial = new THREE.ShaderMaterial({
            uniforms: {
                tDiffuse: { value: null },
                uGravity: { value: gravity },
                uDeltaTime: { value: 0.016 },
                uRes: { value: new THREE.Vector2(RESOLUTION, RESOLUTION) }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform vec2 uGravity;
                uniform float uDeltaTime;
                varying vec2 vUv;

                void main() {
                    // 簡易的な移流と重力の影響
                    // 本来はNavier-Stokes方程式に基づきますが、ここでは概念的な重力移動のみ
                    vec2 offset = uGravity * uDeltaTime * 0.1;
                    vec4 color = texture2D(tDiffuse, vUv - offset);
                    
                    // 減衰させて跡が残りすぎないようにする
                    gl_FragColor = color * 0.99;

                    // 中央に常にエミッターを置く（デモ用）
                    float dist = distance(vUv, vec2(0.5));
                    if(dist < 0.05) gl_FragColor += vec4(0.5, 0.8, 1.0, 1.0);
                }
            `
        });

        // 描画用プレーン
        const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), fluidMaterial);
        scene.add(quad);

        // --- 端末の傾きを取得 ---
        window.addEventListener('deviceorientation', (event) => {
            // beta: X軸（前後）、gamma: Y軸（左右）
            const x = event.gamma / 90; // -1 to 1
            const y = -event.beta / 90; // -1 to 1
            gravity.set(x, y);
        });

        // iOS用の権限リクエスト（必要に応じてボタン等で実行）
        window.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission();
            }
        });

        // --- アニメーションループ ---
        function animate() {
            requestAnimationFrame(animate);

            // 計算ステップ
            fluidMaterial.uniforms.tDiffuse.value = densityBackBuffer.texture;
            fluidMaterial.uniforms.uGravity.value = gravity;
            
            renderer.setRenderTarget(densityBuffer);
            renderer.render(scene, camera);

            // 結果を画面に表示
            renderer.setRenderTarget(null);
            renderer.render(scene, camera);

            // バッファの入れ替え
            let temp = densityBuffer;
            densityBuffer = densityBackBuffer;
            densityBackBuffer = temp;
        }

        animate();

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Device Orientation Fluid Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; touch-action: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex;
            justify-content: center; align-items: center; z-index: 10;
        }
        #startButton {
            padding: 15px 30px; font-size: 18px; border: none; border-radius: 8px;
            background-color: #007bff; color: white; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <button id="startButton">シミュレーション開始</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        let instancedMesh;
        
        // シミュレーション設定
        const PARTICLE_COUNT = 3000;
        const PARTICLE_SIZE = 0.05;
        const positions = new Float32Array(PARTICLE_COUNT * 2); // x, yのみ (2D)
        const velocities = new Float32Array(PARTICLE_COUNT * 2);
        
        // 重力ベクトル (初期値は下向き)
        let gravityX = 0;
        let gravityY = -9.8;
        
        // 画面の境界 (OrthographicCameraの範囲)
        let bounds = { left: -5, right: 5, bottom: -5, top: 5 };

        init();
        animate();

        function init() {
            // 1. シーンとカメラのセットアップ (2DシミュレーションのためOrthographicCameraを使用)
            scene = new THREE.Scene();
            const aspect = window.innerWidth / window.innerHeight;
            const frustumSize = 10;
            camera = new THREE.OrthographicCamera(
                frustumSize * aspect / - 2, frustumSize * aspect / 2,
                frustumSize / 2, frustumSize / - 2,
                0.1, 100
            );
            camera.position.z = 10;
            
            updateBounds();

            // 2. レンダラーのセットアップ
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 3. パーティクルの生成 (InstancedMeshで描画負荷を下げる)
            const geometry = new THREE.CircleGeometry(PARTICLE_SIZE, 16);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x00aaff, 
                transparent: true, 
                opacity: 0.8 
            });
            instancedMesh = new THREE.InstancedMesh(geometry, material, PARTICLE_COUNT);
            
            const dummy = new THREE.Object3D();
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                // 初期位置をランダムに配置
                positions[i * 2] = (Math.random() - 0.5) * (bounds.right - bounds.left) * 0.8;
                positions[i * 2 + 1] = (Math.random() - 0.5) * (bounds.top - bounds.bottom) * 0.8;
                
                // 初速度はゼロ
                velocities[i * 2] = 0;
                velocities[i * 2 + 1] = 0;

                dummy.position.set(positions[i * 2], positions[i * 2 + 1], 0);
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);
            }
            scene.add(instancedMesh);

            // 4. イベントリスナーの設定
            window.addEventListener('resize', onWindowResize);
            
            const startButton = document.getElementById('startButton');
            startButton.addEventListener('click', () => {
                requestDeviceOrientation();
            });
        }

        // ジャイロセンサーの許可と初期化
        function requestDeviceOrientation() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS 13+ の場合
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            hideOverlay();
                        } else {
                            alert("センサーのアクセスが拒否されました。");
                        }
                    })
                    .catch(console.error);
            } else {
                // Android や 古いiOSの場合
                window.addEventListener('deviceorientation', handleOrientation);
                hideOverlay();
            }
        }

        function hideOverlay() {
            document.getElementById('overlay').style.display = 'none';
        }

        // 端末の向きから重力ベクトルを計算
        function handleOrientation(event) {
            let beta = event.beta;   // X軸の回転 (手前/奥への傾き) [-180, 180]
            let gamma = event.gamma; // Y軸の回転 (左右への傾き) [-90, 90]

            // 画面の向き（縦持ち・横持ち）を考慮
            let orientation = window.screen.orientation ? window.screen.orientation.angle : window.orientation || 0;

            let vecX = 0;
            let vecY = 0;

            if (orientation === 0) { // 縦持ち
                vecX = gamma;
                vecY = beta;
            } else if (orientation === 90) { // 横持ち (左回転)
                vecX = beta;
                vecY = -gamma;
            } else if (orientation === -90 || orientation === 270) { // 横持ち (右回転)
                vecX = -beta;
                vecY = gamma;
            }

            // 重力の強さを調整 (適度な感度にスケール)
            const sensitivity = 0.2;
            gravityX = vecX * sensitivity;
            
            // スマホを水平に持った状態(beta~0)ではなく、画面を立てた状態(beta~90)をベースにする場合は調整が必要ですが、
            // 今回は単純に傾いた方向へ重力が働くようにします。
            // 重力は下向きがマイナスなので反転
            gravityY = -vecY * sensitivity; 
        }

        function updateBounds() {
            const aspect = window.innerWidth / window.innerHeight;
            const frustumSize = 10;
            bounds.left = frustumSize * aspect / - 2;
            bounds.right = frustumSize * aspect / 2;
            bounds.bottom = frustumSize / - 2;
            bounds.top = frustumSize / 2;
        }

        function onWindowResize() {
            const aspect = window.innerWidth / window.innerHeight;
            const frustumSize = 10;
            camera.left = frustumSize * aspect / - 2;
            camera.right = frustumSize * aspect / 2;
            camera.top = frustumSize / 2;
            camera.bottom = frustumSize / - 2;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateBounds();
        }

        function animate() {
            requestAnimationFrame(animate);

            const dt = 0.016; // 約60fpsのタイムステップ
            const dummy = new THREE.Object3D();
            const damping = 0.95; // 粘性（空気抵抗・摩擦）
            const bounce = 0.5;   // 壁にぶつかった時の反発係数

            // 物理演算の更新 (オイラー法)
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let px = positions[i * 2];
                let py = positions[i * 2 + 1];
                let vx = velocities[i * 2];
                let vy = velocities[i * 2 + 1];

                // 重力を適用
                vx += gravityX * dt;
                vy += gravityY * dt;

                // 速度に減衰（粘性）をかける
                vx *= damping;
                vy *= damping;

                // 位置を更新
                px += vx;
                py += vy;

                // 画面境界での衝突判定
                if (px < bounds.left + PARTICLE_SIZE) {
                    px = bounds.left + PARTICLE_SIZE;
                    vx *= -bounce;
                } else if (px > bounds.right - PARTICLE_SIZE) {
                    px = bounds.right - PARTICLE_SIZE;
                    vx *= -bounce;
                }

                if (py < bounds.bottom + PARTICLE_SIZE) {
                    py = bounds.bottom + PARTICLE_SIZE;
                    vy *= -bounce;
                } else if (py > bounds.top - PARTICLE_SIZE) {
                    py = bounds.top - PARTICLE_SIZE;
                    vy *= -bounce;
                }

                // 状態を保存
                positions[i * 2] = px;
                positions[i * 2 + 1] = py;
                velocities[i * 2] = vx;
                velocities[i * 2 + 1] = vy;

                // メッシュに位置を反映
                dummy.position.set(px, py, 0);
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);
            }

            // 更新をThree.jsに通知
            instancedMesh.instanceMatrix.needsUpdate = true;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>

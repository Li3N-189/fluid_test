<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Three.js Stable Fluids + Gravity</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #permission-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 15px 30px; font-size: 18px; z-index: 10;
        }
    </style>
</head>
<body>
    <button id="permission-btn">センサーへのアクセスを許可して開始</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. 基本セットアップ ---
        const width = window.innerWidth;
        const height = window.innerHeight;
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(width, height);
        document.body.appendChild(renderer.domElement);

        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const scene = new THREE.Scene();
        const geometry = new THREE.PlaneGeometry(2, 2);

        // --- 2. GPGPU用レンダーターゲット (Ping-Pong) ---
        // RGBAFloatを使用して精度を確保 (モバイル対応ならHalfFloatTypeを推奨)
        const simRes = 256; // シミュレーション解像度
        const options = {
            width: simRes, height: simRes,
            minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
            format: THREE.RGBAFormat, type: THREE.HalfFloatType,
            depthBuffer: false, stencilBuffer: false
        };
        let rtRead = new THREE.WebGLRenderTarget(simRes, simRes, options);
        let rtWrite = new THREE.WebGLRenderTarget(simRes, simRes, options);

        function swapTargets() {
            const temp = rtRead;
            rtRead = rtWrite;
            rtWrite = temp;
        }

        // --- 3. 共通のシェーダーUniforms ---
        const texelSize = new THREE.Vector2(1.0 / simRes, 1.0 / simRes);
        const dt = 0.016; // タイムステップ

        // --- 4. GLSL シェーダー群 ---
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        // 4.1 移流・外力・発散・圧力計算をまとめたシミュレーションマテリアル構築関数
        function createMaterial(fragmentShaderCode, uniforms) {
            return new THREE.ShaderMaterial({
                vertexShader,
                fragmentShader: fragmentShaderCode,
                uniforms: uniforms,
                depthWrite: false, depthTest: false
            });
        }

        // 外力 (重力) の適用
        const forceMat = createMaterial(`
            varying vec2 vUv;
            uniform sampler2D uTex;
            uniform vec2 uGravity;
            uniform float uDt;
            void main() {
                vec4 data = texture2D(uTex, vUv);
                vec2 vel = data.rg;
                // 重力を速度に加算
                vel += uGravity * uDt * 500.0; 
                // 減衰
                vel *= 0.99;
                gl_FragColor = vec4(vel, data.b, data.a);
            }
        `, { uTex: { value: null }, uGravity: { value: new THREE.Vector2(0, 0) }, uDt: { value: dt } });

        // 移流 (Advection)
        const advectionMat = createMaterial(`
            varying vec2 vUv;
            uniform sampler2D uTex;
            uniform vec2 uTexelSize;
            uniform float uDt;
            void main() {
                vec4 data = texture2D(uTex, vUv);
                vec2 vel = data.rg;
                vec2 pastUv = vUv - vel * uTexelSize * uDt * 100.0;
                vec4 pastData = texture2D(uTex, pastUv);
                // 速度のみ移流させる (R, G更新)
                gl_FragColor = vec4(pastData.rg, data.b, data.a);
            }
        `, { uTex: { value: null }, uTexelSize: { value: texelSize }, uDt: { value: dt } });

        // 発散 (Divergence)
        const divergenceMat = createMaterial(`
            varying vec2 vUv;
            uniform sampler2D uTex;
            uniform vec2 uTexelSize;
            void main() {
                float L = texture2D(uTex, vUv - vec2(uTexelSize.x, 0)).r;
                float R = texture2D(uTex, vUv + vec2(uTexelSize.x, 0)).r;
                float B = texture2D(uTex, vUv - vec2(0, uTexelSize.y)).g;
                float T = texture2D(uTex, vUv + vec2(0, uTexelSize.y)).g;
                vec4 data = texture2D(uTex, vUv);
                float div = 0.5 * ((R - L) + (T - B));
                // Aチャンネル(発散)のみ更新、他は維持
                gl_FragColor = vec4(data.rg, data.b, div);
            }
        `, { uTex: { value: null }, uTexelSize: { value: texelSize } });

        // 圧力 (Jacobi法)
        const jacobiMat = createMaterial(`
            varying vec2 vUv;
            uniform sampler2D uTex;
            uniform vec2 uTexelSize;
            void main() {
                float L = texture2D(uTex, vUv - vec2(uTexelSize.x, 0)).b;
                float R = texture2D(uTex, vUv + vec2(uTexelSize.x, 0)).b;
                float B = texture2D(uTex, vUv - vec2(0, uTexelSize.y)).b;
                float T = texture2D(uTex, vUv + vec2(0, uTexelSize.y)).b;
                vec4 data = texture2D(uTex, vUv);
                float div = data.a;
                float p = (L + R + B + T - div) * 0.25;
                // Bチャンネル(圧力)のみ更新
                gl_FragColor = vec4(data.rg, p, data.a);
            }
        `, { uTex: { value: null }, uTexelSize: { value: texelSize } });

        // 勾配減算 (Gradient Subtraction)
        const gradientMat = createMaterial(`
            varying vec2 vUv;
            uniform sampler2D uTex;
            uniform vec2 uTexelSize;
            void main() {
                float L = texture2D(uTex, vUv - vec2(uTexelSize.x, 0)).b;
                float R = texture2D(uTex, vUv + vec2(uTexelSize.x, 0)).b;
                float B = texture2D(uTex, vUv - vec2(0, uTexelSize.y)).b;
                float T = texture2D(uTex, vUv + vec2(0, uTexelSize.y)).b;
                vec4 data = texture2D(uTex, vUv);
                vec2 vel = data.rg;
                vel.x -= 0.5 * (R - L);
                vel.y -= 0.5 * (T - B);
                // 最終的な速度を適用
                gl_FragColor = vec4(vel, data.b, data.a);
            }
        `, { uTex: { value: null }, uTexelSize: { value: texelSize } });

        // 画面描画用 (速度場を色で可視化)
        const displayMat = createMaterial(`
            varying vec2 vUv;
            uniform sampler2D uTex;
            void main() {
                vec4 data = texture2D(uTex, vUv);
                vec2 vel = data.rg;
                // 速度のXYをRGに割り当て、視覚化
                float r = vel.x * 0.5 + 0.5;
                float g = vel.y * 0.5 + 0.5;
                float b = length(vel);
                gl_FragColor = vec4(r, g, b, 1.0);
            }
        `, { uTex: { value: null } });

        const mesh = new THREE.Mesh(geometry, displayMat);
        scene.add(mesh);

        // シミュレーションステップの実行ヘルパー
        function compute(material) {
            mesh.material = material;
            material.uniforms.uTex.value = rtRead.texture;
            renderer.setRenderTarget(rtWrite);
            renderer.render(scene, camera);
            swapTargets();
        }

        // --- 5. センサー入力 (DeviceOrientation) ---
        let gravityX = 0, gravityY = -1; // 初期値は下方向
        
        function handleOrientation(event) {
            // beta: X軸回転 (-180 to 180), gamma: Y軸回転 (-90 to 90)
            if (event.beta !== null && event.gamma !== null) {
                // 画面の向き(Portrait/Landscape)に応じてXYを調整する必要がありますが、
                // ここでは単純なPortraitを想定しています。
                gravityX = event.gamma / 90.0;
                gravityY = -event.beta / 90.0;
                
                // クランプ
                gravityX = Math.max(-1, Math.min(1, gravityX));
                gravityY = Math.max(-1, Math.min(1, gravityY));
            }
        }

        const btn = document.getElementById('permission-btn');
        btn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        btn.style.display = 'none';
                    } else {
                        alert('センサーへのアクセスが拒否されました。');
                    }
                } catch (e) {
                    console.error(e);
                }
            } else {
                // Androidや古いiOSなどはそのまま追加可能
                window.addEventListener('deviceorientation', handleOrientation);
                btn.style.display = 'none';
            }
        });

        // --- 6. アニメーションループ ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. 外力 (センサーから得た重力)
            forceMat.uniforms.uGravity.value.set(gravityX, gravityY);
            compute(forceMat);

            // 2. 移流
            compute(advectionMat);

            // 3. 発散
            compute(divergenceMat);

            // 4. 圧力計算 (ヤコビ法) - 複数回回して精度を上げる
            for (let i = 0; i < 20; i++) {
                compute(jacobiMat);
            }

            // 5. 勾配の減算 (非圧縮性の適用)
            compute(gradientMat);

            // 6. 画面へ描画
            renderer.setRenderTarget(null); // デフォルトのキャンバスに戻す
            displayMat.uniforms.uTex.value = rtRead.texture;
            mesh.material = displayMat;
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

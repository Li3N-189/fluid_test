<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Three.js Device Orientation Fluid</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #050510;
      color: white;
      font-family: sans-serif;
    }
    #ui {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.7);
      z-index: 10;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background-color: #007BFF;
      color: white;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="ui">
    <button id="startButton">シミュレーション開始</button>
  </div>
  <div id="canvas-container"></div>

  <script>
    let scene, camera, renderer, particles;
    let particleCount = 600; // スマホのCPU負荷を考慮した数
    let positions, velocities;
    
    // 重力ベクトル（初期値は下向き）
    let gravity = new THREE.Vector2(0, -980); 
    
    // 画面の境界
    let bounds = { width: window.innerWidth, height: window.innerHeight };

    function init() {
      // 1. シーンとカメラのセットアップ（2Dなので平行投影カメラを使用）
      scene = new THREE.Scene();
      camera = new THREE.OrthographicCamera(
        -bounds.width / 2, bounds.width / 2, 
        bounds.height / 2, -bounds.height / 2, 
        1, 1000
      );
      camera.position.z = 10;

      renderer = new THREE.WebGLRenderer({ antialias: false });
      renderer.setSize(bounds.width, bounds.height);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.getElementById('canvas-container').appendChild(renderer.domElement);

      // 2. 流体を表現するパーティクルの作成
      const geometry = new THREE.BufferGeometry();
      positions = new Float32Array(particleCount * 3);
      velocities = [];

      for (let i = 0; i < particleCount; i++) {
        // 初期位置をランダムに配置
        positions[i * 3] = (Math.random() - 0.5) * bounds.width * 0.5;
        positions[i * 3 + 1] = (Math.random() - 0.5) * bounds.height * 0.5;
        positions[i * 3 + 2] = 0;

        velocities.push(new THREE.Vector2(0, 0));
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

      // パーティクルの見た目を滑らかにするテクスチャをCanvasで生成
      const canvas = document.createElement('canvas');
      canvas.width = 64; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
      gradient.addColorStop(0, 'rgba(100, 200, 255, 1)');
      gradient.addColorStop(0.2, 'rgba(50, 150, 255, 0.8)');
      gradient.addColorStop(1, 'rgba(0, 50, 255, 0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 64, 64);
      const texture = new THREE.CanvasTexture(canvas);

      // 加算合成を使用して流体のような「まとまり」を表現
      const material = new THREE.PointsMaterial({
        size: 40,
        map: texture,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });

      particles = new THREE.Points(geometry, material);
      scene.add(particles);

      // リサイズイベント
      window.addEventListener('resize', onWindowResize);

      // アニメーション開始
      animate();
    }

    function onWindowResize() {
      bounds.width = window.innerWidth;
      bounds.height = window.innerHeight;
      camera.left = -bounds.width / 2;
      camera.right = bounds.width / 2;
      camera.top = bounds.height / 2;
      camera.bottom = -bounds.height / 2;
      camera.updateProjectionMatrix();
      renderer.setSize(bounds.width, bounds.height);
    }

    // 3. 端末の傾きを取得する処理
    function setupDeviceOrientation() {
      window.addEventListener('deviceorientation', (event) => {
        // gamma: 左右の傾き (-90 to 90)
        // beta: 前後の傾き (-180 to 180)
        
        let tiltX = event.gamma;
        let tiltY = event.beta;

        // 画面の向き（縦持ち・横持ち）による補正
        if (window.orientation === 90) {
          tiltX = event.beta;
          tiltY = -event.gamma;
        } else if (window.orientation === -90) {
          tiltX = -event.beta;
          tiltY = event.gamma;
        }

        // 傾きを重力ベクトルに変換（感度調整）
        const gravityScale = 20.0;
        gravity.x = tiltX * gravityScale;
        gravity.y = -tiltY * gravityScale; 
      });
    }

    // 4. 物理演算と描画のループ
    const dt = 0.016; // 約60fpsのタイムステップ
    const interactionRadius = 50; // 粒子同士が反発する距離

    function animate() {
      requestAnimationFrame(animate);

      const posAttribute = particles.geometry.attributes.position;
      const posArray = posAttribute.array;

      for (let i = 0; i < particleCount; i++) {
        let vx = velocities[i].x;
        let vy = velocities[i].y;
        let px = posArray[i * 3];
        let py = posArray[i * 3 + 1];

        // 重力の適用
        vx += gravity.x * dt;
        vy += gravity.y * dt;

        // 簡易的な流体表現（粒子同士の反発による体積維持）
        // ※CPU負荷を抑えるため、ランダムな近傍粒子とのみ計算
        for (let j = 0; j < 10; j++) {
          let randomIdx = Math.floor(Math.random() * particleCount);
          if (randomIdx === i) continue;
          
          let dx = px - posArray[randomIdx * 3];
          let dy = py - posArray[randomIdx * 3 + 1];
          let distSq = dx * dx + dy * dy;

          if (distSq > 0 && distSq < interactionRadius * interactionRadius) {
            let dist = Math.sqrt(distSq);
            let force = (interactionRadius - dist) / interactionRadius;
            vx += (dx / dist) * force;
            vy += (dy / dist) * force;
          }
        }

        // 粘性（減衰）の適用
        vx *= 0.95;
        vy *= 0.95;

        // 位置の更新
        px += vx * dt;
        py += vy * dt;

        // 画面境界でのバウンド処理
        const halfW = bounds.width / 2;
        const halfH = bounds.height / 2;
        const padding = 10;

        if (px < -halfW + padding) { px = -halfW + padding; vx *= -0.5; }
        if (px > halfW - padding) { px = halfW - padding; vx *= -0.5; }
        if (py < -halfH + padding) { py = -halfH + padding; vy *= -0.5; }
        if (py > halfH - padding) { py = halfH - padding; vy *= -0.5; }

        velocities[i].x = vx;
        velocities[i].y = vy;
        posArray[i * 3] = px;
        posArray[i * 3 + 1] = py;
      }

      posAttribute.needsUpdate = true;
      renderer.render(scene, camera);
    }

    // iOS 13+ のセンサー許可プロンプト対応
    document.getElementById('startButton').addEventListener('click', () => {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
          .then(permissionState => {
            if (permissionState === 'granted') {
              setupDeviceOrientation();
              document.getElementById('ui').style.display = 'none';
              init();
            } else {
              alert('センサーの利用が許可されませんでした。');
            }
          })
          .catch(console.error);
      } else {
        // PCやiOS 13未満の端末用
        setupDeviceOrientation();
        document.getElementById('ui').style.display = 'none';
        init();
      }
    });
  </script>
</body>
</html>
